<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship Command Clock HUD</title>
    <style>
        /* 載入未來科技感字體 */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --cyber-pink: #ff00ea;
            --dark-bg: #03070b;
            --glass-bg: rgba(5, 15, 25, 0.6);
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 飛船背景圖 - 增加層次感 */
        .spaceship-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 預設使用我為你生成的飛船背景，你可以改成自己的圖片路徑 */
            background: url('https://r.jina.ai/i/e42f6c979a4a49c9860b73c4155146c6') no-repeat center center;
            background-size: cover;
            z-index: -2;
            filter: brightness(0.7) contrast(1.1);
        }

        /* 粒子背景 - 動態科技感 */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.05;
            z-index: -1;
            animation: moveParticles 60s linear infinite;
        }

        @keyframes moveParticles {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* 掃描線和螢幕噪點效果 */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 1;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
        }

        /* 時鐘 HUD 容器 - 增加懸浮動畫 */
        .hud-container {
            position: relative;
            background: var(--glass-bg);
            padding: 2rem 4rem;
            border: 2px solid rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 242, 255, 0.1);
            text-align: center;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(0.5deg); }
        }

        /* HUD 角落裝飾線 */
        .corner { position: absolute; width: 25px; height: 25px; border: 3px solid var(--neon-blue); }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .top-r { top: -5px; right: -5px; border-left: 0; border-bottom: 0; }
        .bottom-l { bottom: -5px; left: -5px; border-right: 0; border-top: 0; }
        .bottom-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

        .sys-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .time-display {
            font-size: 7.5rem;
            font-weight: 700;
            text-shadow: var(--neon-shadow);
            display: flex;
            justify-content: center;
            align-items: baseline;
            margin: 15px 0;
            letter-spacing: -2px;
        }

        .seconds {
            font-size: 3rem;
            margin-left: 20px;
            color: var(--cyber-pink);
            text-shadow: 0 0 15px var(--cyber-pink);
            width: 100px;
            text-align: left;
        }

        /* 資料流和狀態 */
        .status-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 242, 255, 0.3);
            font-family: 'Rajdhani', sans-serif;
        }

        .sys-status-label {
            background: var(--neon-blue);
            color: #000;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 10px;
        }

        .status-items {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="spaceship-bg"></div>
    <div class="particles"></div>
    <div class="scanlines"></div>

    <div class="hud-container">
        <div class="corner top-l"></div>
        <div class="corner top-r"></div>
        <div class="corner bottom-l"></div>
        <div class="corner bottom-r"></div>

        <div class="sys-label" id="date">SYNCING WITH NAV-SYSTEM...</div>
        
        <div class="time-display">
            <span id="time">14:18</span>
            <span class="seconds" id="secs">36</span>
        </div>

        <div class="status-box">
            <span class="sys-status-label">MOTIVATION_CORE</span>
            <span style="font-size: 1.1rem; color: #fff;">The best way to predict the future is to create it.</span>
            <div class="status-items">
                <span>WARP_DRIVE: STABLE</span>
                <span>SHIELD_LEVEL: 100%</span>
                <span>OXYGEN: OPTIMAL</span>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('time').textContent = `${h}:${m}`;
            document.getElementById('secs').textContent = s;

            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = `NAVIGATION DATE // ${now.toLocaleDateString('en-US', options).toUpperCase()}`;
        }

        window.onload = () => {
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
