<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Cyber Terminal - Color Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        /* 定義色彩變數，方便一鍵切換 */
        :root {
            --main-color: #00f2ff; /* 預設藍色 */
            --sub-color: #ff00ea;
            --bg-filter: hue-rotate(0deg);
            --glass: rgba(5, 15, 25, 0.75);
            --glow: 0 0 15px var(--main-color);
        }

        /* 不同配色模式 */
        .theme-pink { --main-color: #ff00ea; --sub-color: #00f2ff; --bg-filter: hue-rotate(300deg); }
        .theme-gold { --main-color: #ffcc00; --sub-color: #ffffff; --bg-filter: hue-rotate(45deg) brightness(1.2); }
        .theme-green { --main-color: #00ff66; --sub-color: #00f2ff; --bg-filter: hue-rotate(120deg); }
        .theme-red { --main-color: #ff3300; --sub-color: #ffff00; --bg-filter: hue-rotate(350deg); }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Orbitron', sans-serif; color: var(--main-color);
            transition: color 0.5s ease;
        }

        /* --- 背景系統：Urus + 動態濾鏡 --- */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center center;
            z-index: -2; 
            background-image: url('https://r.jina.ai/i/e42f6c979a4a49c9860b73c4155146c6'); /* 你的 Urus 圖片 */
            filter: brightness(0.7) contrast(1.1) var(--bg-filter);
            transition: filter 1s ease;
            transform: scale(1.05);
        }

        .overlay-fx {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; z-index: 1; pointer-events: none;
            opacity: 0.3;
        }

        /* --- HUD 面板 --- */
        .main-container {
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .hud-panel {
            position: relative; background: var(--glass);
            padding: 3rem 5rem; border: 2px solid var(--main-color);
            backdrop-filter: blur(20px); border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            text-align: center; z-index: 10; animation: hover 6s ease-in-out infinite;
            transition: border-color 0.5s ease;
        }

        @keyframes hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .corner { position: absolute; width: 30px; height: 30px; border: 3px solid var(--main-color); transition: 0.5s; }
        .tl { top: -8px; left: -8px; border-right: 0; border-bottom: 0; }
        .tr { top: -8px; right: -8px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -8px; left: -8px; border-right: 0; border-top: 0; }
        .br { bottom: -8px; right: -8px; border-left: 0; border-top: 0; }

        .time-display {
            font-size: 7.5rem; font-weight: 700; text-shadow: var(--glow);
            display: flex; align-items: baseline; justify-content: center;
            transition: text-shadow 0.5s ease;
        }

        .seconds {
            font-size: 3rem; margin-left: 15px; color: var(--sub-color);
            text-shadow: 0 0 15px var(--sub-color); width: 100px; text-align: left;
            transition: color 0.5s ease;
        }

        .motivation-container {
            margin: 20px 0; padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 50px; font-family: 'Rajdhani', sans-serif;
        }

        #quote-text {
            font-size: 1.4rem; letter-spacing: 2px; color: #fff;
            transition: opacity 0.5s ease; text-transform: uppercase;
        }

        .btn-group {
            display: flex; justify-content: center; gap: 15px; margin-top: 20px;
        }

        .hud-btn {
            background: transparent; border: 1px solid var(--main-color);
            color: var(--main-color); padding: 10px 20px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
            letter-spacing: 1.5px; transition: 0.3s;
        }

        .hud-btn:hover { background: var(--main-color); color: #000; box-shadow: var(--glow); }

        .audio-status {
            font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
            margin-top: 15px; opacity: 0.8; color: #fff;
        }

        #video-player { position: absolute; visibility: hidden; width: 1px; height: 1px; }
    </style>
</head>
<body id="main-body">

    <div class="bg-layer"></div>
    <div class="overlay-fx"></div>
    <div id="video-player"></div>

    <div class="main-container">
        <div class="hud-panel">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>

            <div style="font-family: 'Rajdhani'; letter-spacing: 5px; opacity: 0.7;">URUS_COMMAND_V4 // COLOR_SYNC_READY</div>
            
            <div class="time-display">
                <span id="time-text">00:00</span>
                <span class="seconds" id="sec-text">00</span>
            </div>

            <div class="motivation-container">
                <div id="quote-text">COMMANDER, SELECT YOUR THEME.</div>
            </div>

            <div class="btn-group">
                <button class="hud-btn" onclick="nextTheme()">[ COLOR_SHIFT ]</button>
                <button class="hud-btn" onclick="toggleAudio()">[ PLAY_MUSIC ]</button>
            </div>

            <div class="audio-status" id="audio-info">MEDIA: WAITING...</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isPlaying = false;
        let currentTheme = 0;
        const themes = ['', 'theme-pink', 'theme-gold', 'theme-green', 'theme-red'];

        // 配色切換
        function nextTheme() {
            const body = document.getElementById('main-body');
            body.classList.remove(...themes.filter(t => t !== ''));
            currentTheme = (currentTheme + 1) % themes.length;
            if (themes[currentTheme]) {
                body.classList.add(themes[currentTheme]);
            }
        }

        // YouTube API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('video-player', {
                height: '0', width: '0',
                videoId: 'xX1FYlFEANs',
                events: { 'onReady': () => document.getElementById('audio-info').innerText = "MEDIA: 九彎十八拐 READY" }
            });
        }

        function toggleAudio() {
            if (!player) return;
            if (isPlaying) {
                player.pauseVideo();
                document.getElementById('audio-info').innerText = "MEDIA: PAUSED";
            } else {
                player.playVideo();
                document.getElementById('audio-info').innerText = "PLAYING: 九彎十八拐";
            }
            isPlaying = !isPlaying;
        }

        // 時鐘與金句
        const quotes = [
            "Fortune favors the bold.",
            "Drive your dreams into reality.",
            "Stay hungry, stay foolish.",
            "Speed has never killed anyone, suddenly becoming stationary… that’s what gets you.",
            "The future belongs to those who believe in the beauty of their dreams."
        ];

        function rotateQuote() {
            const qEl = document.getElementById('quote-text');
            qEl.style.opacity = 0;
            setTimeout(() => {
                qEl.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                qEl.style.opacity = 1;
            }, 500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time-text').innerText = 
                `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            document.getElementById('sec-text').innerText = 
                now.getSeconds().toString().padStart(2, '0');
        }

        setInterval(updateClock, 1000);
        setInterval(rotateQuote, 5000);
        updateClock();
    </script>
</body>
</html>
